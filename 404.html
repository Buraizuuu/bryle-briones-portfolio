<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Bryle Briones</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #09090B;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    h1, h2, h3 { font-family: 'Archivo', sans-serif; }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(37,99,235,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 70% 45% at 80% 90%, rgba(124,58,237,0.06) 0%, transparent 70%);
    }

    .gradient-text {
      background: linear-gradient(135deg, #60A5FA 0%, #A78BFA 50%, #34D399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-28px) scale(1.04); }
    }
    .orb-1 { animation: float 9s ease-in-out infinite; }
    .orb-2 { animation: float 11s ease-in-out 2s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .orb-1, .orb-2 { animation: none; }
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #2563EB;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-home:hover { background: #3B82F6; }
  </style>
</head>
<body>

  <div class="orb orb-1 w-96 h-96 bg-blue-600/40 -top-32 -left-32" style="position:fixed;" aria-hidden="true"></div>
  <div class="orb orb-2 w-80 h-80 bg-violet-600/35 bottom-0 right-0" style="position:fixed;" aria-hidden="true"></div>

  <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;">

    <!-- Nav -->
    <header style="padding:1rem 1.5rem;">
      <a href="/" class="inline-flex items-center gap-3" aria-label="Back to portfolio home">
        <img src="assets/logo.svg" alt="Bryle Briones logo" style="width:2rem;height:2rem;border-radius:0.75rem;" />
        <span style="font-family:'Archivo',sans-serif;font-weight:600;color:white;font-size:0.875rem;">Bryle Briones</span>
      </a>
    </header>

    <!-- Main -->
    <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;">
      <div style="text-align:center;max-width:28rem;">

        <p style="font-family:'Archivo',sans-serif;font-size:7rem;font-weight:700;line-height:1;margin:0 0 0.5rem;" class="gradient-text" aria-label="Error 404">404</p>

        <h1 style="font-family:'Archivo',sans-serif;font-size:1.5rem;font-weight:700;color:white;margin:0 0 0.75rem;">
          Page Not Found
        </h1>

        <p style="color:#71717A;font-size:1rem;line-height:1.6;margin:0 0 2rem;">
          This page doesn't exist or was moved.<br/>Let's get you back on track.
        </p>

        <a href="/" class="btn-home">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to Portfolio
        </a>

      </div>
    </main>

  </div>

</body>
</html>
