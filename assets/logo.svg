<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.16"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="100" height="52" rx="22" fill="url(#shine)"/>

  <!-- Terminal chevron ">" — represents automation/run -->
  <path d="M16 33 L37 50 L16 67"
        stroke="rgba(255,255,255,0.90)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Checkmark "✓" — represents QA pass -->
  <path d="M50 54 L61 65 L84 36"
        stroke="white" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
